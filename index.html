<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Material Finder</title>

  <!-- Favicon / Icon -->
  <link rel="icon" href="materialfinder_icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="materialfinder_icon.png" />

  <!-- ✅ LOKAL statt CDN -->
  <script src="js/xlsx.full.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fa;
      color: #222;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 2rem;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .excel-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: none;
      font-size: 0.9rem;
      background: #e0e0e0;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
    }

    .excel-button span.icon { font-size: 1.1rem; }

    .status-text {
      font-size: 0.8rem;
      color: #555;
      text-align: right;
      flex: 1;
    }

    /* --- SAP Suche --- */
    .sap-search {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 4px;
    }

    .sap-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      display: block;
    }

    .sap-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .sap-label {
      font-size: 0.9rem;
      color: #333;
      font-weight: 600;
    }

    .sap-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .sap-input {
      flex: 1;
      padding: 10px 12px;
      font-size: 1.05rem;
      border-radius: 12px;
      border: 1px solid #cdd4e0;
      background: #ffffff;
      min-width: 0;
    }

    .sap-btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      background: #0050a0;
      color: #fff;
      cursor: pointer;
      font-size: 1.05rem;
      white-space: nowrap;
    }

    .materials {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      margin: 16px 0;
    }

    .mat-btn {
      padding: 10px 0;
      border-radius: 12px;
      border: none;
      background: #4b4f57;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    .mat-btn.active { background: #0050a0; }

    .dimension-area {
      margin-top: 8px;
      display: none;
    }

    .dim-row-selects {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 6px;
    }

    .dim-picker { position: relative; }

    select {
      width: 100%;
      padding: 10px 12px;
      font-size: 1.1rem;
      border-radius: 12px;
      border: 1px solid #cdd4e0;
      background: #ffffff;
      appearance: none;
      -webkit-appearance: none;
    }

    .dim-picker::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: #666;
      pointer-events: none;
    }

    .search-btn {
      margin-top: 14px;
      width: 100%;
      padding: 12px 0;
      font-size: 1.15rem;
      border-radius: 12px;
      border: none;
      background: #0050a0;
      color: #fff;
      cursor: pointer;
    }

    .result-area {
      margin-top: 24px;
      display: none;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .result-wrapper {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
      width: 100%;
    }

    /* ✅ WICHTIG: links bündig + wrap => nebeneinander, dann neue Zeile links */
    .results-column {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-start;
      align-content: flex-start;
      width: calc(100% - 240px);
      min-width: 220px;
    }

    .result-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      max-width: 260px;
      transform: scale(0.85);
      transform-origin: top left;
    }

    .result-card {
      background: #0050a0;
      border-radius: 32px;
      width: min(40vh, 40vw);
      height: min(40vh, 40vw);
      max-width: 220px;
      max-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #ffd600;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }

    .result-number-big {
      font-size: 4.8rem;
      font-weight: 900;
      line-height: 1;
    }

    .result-fach {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .result-line {
      font-size: 1.1rem;
      font-weight: 600;
      color: #000;
      margin-top: 2px;
      text-align: center;
    }

    .result-shelf {
      margin-top: 2px;
      background: #d1d5db;
      border-radius: 14px;
      padding: 6px 10px;
      min-width: 220px;
      display: flex;
      justify-content: center;
    }

    .result-shelf-inner {
      background: #ffffff;
      border-radius: 10px;
      padding: 4px 20px;
      min-width: 90px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.15rem;
      color: #000;
    }

    .result-info {
      margin-top: 2px;
      font-size: 0.8rem;
      color: #444;
      text-align: center;
    }

    .results-new-search {
      flex-basis: 100%;
      margin-top: 8px;
    }

    /* --- LAGEPLAN --- */
    .layout-plan-wrapper {
      margin-top: 4px;
      flex: 0 0 220px;
      max-width: 220px;
      display: flex;
      justify-content: center;
    }

    .layout-plan {
      position: relative;
      width: 100%;
      aspect-ratio: 6 / 13;
      border-radius: 10px;
      background: #f9fafb;
      overflow: hidden;
    }

    .layout-plan::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 3px solid #111827;
      border-radius: 10px;
      box-sizing: border-box;
      z-index: 3;
    }

    .layout-plan-cell {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 4px;
      box-sizing: border-box;
      background: #e5e7eb;
      color: #111827;
      border: 1px solid #9ca3af;
      z-index: 2;
    }

    .layout-plan-cell.active {
      background: #0050a0;
      color: #ffd600;
      border-color: #111827;
      box-shadow: 0 0 0 2px #111827;
    }

    .layout-plan-frame {
      position: absolute;
      border: 2px solid #111827;
      border-radius: 6px;
      box-sizing: border-box;
      z-index: 4;
    }

    .layout-plan-frame-top {
      top: 0%;
      left: calc(100% * 1 / 6);
      width: calc(100% * 4 / 6);
      height: calc(100% * 1 / 13);
    }

    .layout-plan-frame-middle {
      top: calc(100% * 3 / 13);
      left: calc(100% * 2 / 6);
      width: calc(100% * 2 / 6);
      height: calc(100% * 5 / 13);
    }

    .layout-plan-frame-bottom {
      top: calc(100% * 10 / 13);
      left: calc(100% * 2 / 6);
      width: calc(100% * 2 / 6);
      height: calc(100% * 3 / 13);
    }

    .layout-plan-break {
      position: absolute;
      left: -20%;
      right: -20%;
      height: 6%;
      background: #f4f6fa;
      border-top: 2px dashed #6b7280;
      border-bottom: 2px dashed #6b7280;
      box-sizing: border-box;
      z-index: 5;
    }

    .layout-plan-break-top { top: 15%; }

    .layout-plan-standpoint {
      position: absolute;
      left: -5%;
      top: 18%;
      width: 10%;
      aspect-ratio: 1 / 1;
      background: #111827;
      border-radius: 50%;
      z-index: 6;
    }

    .layout-plan-standpoint::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 60%;
      transform: translateX(-50%) rotate(45deg);
      width: 55%;
      height: 55%;
      background: #111827;
      border-radius: 2px;
    }

    @media (min-width: 768px) {
      .app { max-width: 640px; }
      .results-column { width: calc(100% - 240px); }
    }

    @media (max-width: 520px) {
      .result-wrapper { flex-wrap: wrap; }
      .results-column { width: 100%; }
      .layout-plan-wrapper { flex: 0 0 100%; max-width: 100%; }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Material Finder</h1>

    <div id="searchSection">
      <div class="top-row">
        <button class="excel-button" id="excelBtn">
          <span class="icon">📥</span>
          <span>Excel importieren</span>
        </button>
        <div class="status-text" id="statusText">
          Keine Excel-Daten importiert (Demo aktiv).
        </div>
      </div>

      <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" />

      <!-- SAP Suche -->
      <div class="sap-search">
        <img class="sap-icon" src="materialfinder_icon.png" alt="icon" />
        <div class="sap-col">
          <div class="sap-label">Nach SAP-Nummer suchen.</div>
          <div class="sap-row">
            <input
              id="sapSearchInput"
              class="sap-input"
              type="text"
              inputmode="numeric"
              value="790000****"
              autocomplete="off"
            />
            <button id="sapSearchBtn" class="sap-btn">Suchen</button>
          </div>
        </div>
      </div>

      <div class="materials" id="materialsContainer"></div>

      <div class="dimension-area" id="dimensionArea">
        <div class="dim-row-selects">
          <div class="dim-picker">
            <select id="select1"></select>
          </div>
          <div class="dim-picker">
            <select id="select2"></select>
          </div>
        </div>
        <button class="search-btn" id="searchBtn">Suchen</button>
      </div>
    </div>

    <div class="result-area" id="resultArea"></div>
  </div>

  <script>
    // ===== Excel-Spalten (wie dein Screenshot) =====
    const COL = {
      KELLER: "Keller",
      MATERIAL: "Material",
      WERKSTOFF: "Werkstoff",
      M1: "Maß 1",
      M2: "Maß 2",
      LAGER: "Lagerplatz"
    };

    const STORAGE_KEY = "materialFinderDataV4_local";

    let dataRows = [];
    let usingExcel = false;

    let selectedWerkstoff = null;

    let currentPairs = [];   // { row, aKey, bKey, isDiaRow }
    let currentDims = [];    // [{ key, num, isDia }]
    let selectedDim1 = null; // key
    let selectedDim2 = null; // key

    const statusTextEl = document.getElementById("statusText");
    const materialsContainer = document.getElementById("materialsContainer");
    const dimensionArea = document.getElementById("dimensionArea");
    const select1 = document.getElementById("select1");
    const select2 = document.getElementById("select2");
    const resultArea = document.getElementById("resultArea");
    const searchSection = document.getElementById("searchSection");

    const sapSearchInput = document.getElementById("sapSearchInput");
    const sapSearchBtn = document.getElementById("sapSearchBtn");

    // Mini-Demo (damit du ohne Excel sofort siehst wie es läuft)
    const demoData = [
      { Keller:"K", Material:"7900000247", Werkstoff:"Toolox", "Maß 1":62, "Maß 2":202, Lagerplatz:"11" },     // 2 Ausgaben: K + Lager
      { Keller:"K", Material:"7900000249", Werkstoff:"Toolox", "Maß 1":51, "Maß 2":147, Lagerplatz:"7.1.1" },  // 2 Ausgaben
      { Keller:"K", Material:"7900000301", Werkstoff:"W300",   "Maß 1":66, "Maß 2":203, Lagerplatz:"" }        // 1 Ausgabe: nur K
      // Beispiel für Ø/DM (nur zum Test, kannst du löschen):
      // { Keller:"K", Material:"7900000999", Werkstoff:"Rundstahl", "Maß 1":"DM30", "Maß 2":"", Lagerplatz:"12" }
    ];

    function trimStr(v){ return v==null ? "" : String(v).trim(); }

    // ===== NEU: DM/Ø Erkennung + Zahl extrahieren =====
    function parseDimCell(raw){
      const t = trimStr(raw);
      if(!t) return { num: null, isDia: false, raw: t };

      const lower = t.toLowerCase();

      // Durchmesser: dm / Ø / ⌀ (groß/klein egal)
      const hasDiaSymbol = /[øØ⌀]/.test(t);
      const hasDM = /\bdm\b/.test(lower) || /^dm/.test(lower);
      const isDia = hasDiaSymbol || hasDM;

      // Zahl extrahieren (30, 30.5, 30,5 etc.)
      const m = t.match(/-?\d+(?:[.,]\d+)?/);
      if(!m) return { num: null, isDia, raw: t };

      const n = parseFloat(m[0].replace(",", "."));
      return { num: isNaN(n) ? null : n, isDia, raw: t };
    }

    function dimKey(num, isDia){
      return (isDia ? "D:" : "N:") + String(num);
    }
    function parseDimKey(key){
      const s = String(key || "");
      const isDia = s.startsWith("D:");
      const numStr = s.slice(2);
      const num = parseFloat(String(numStr).replace(",", "."));
      return { num: isNaN(num) ? null : num, isDia };
    }
    function dimLabelFromKey(key){
      const p = parseDimKey(key);
      if(p.num == null) return "";
      return (p.isDia ? "Ø " : "") + String(p.num);
    }

    function updateStatusText(){
      statusTextEl.textContent = usingExcel
        ? `Excel-Daten aktiv: ${dataRows.length} Datensätze.`
        : "Keine Excel-Daten importiert (Demo aktiv).";
    }

    // gültig, wenn Werkstoff+Maße da sind UND mind. 1 Ort (Keller K oder Lagerplatz)
    function isValidRow(row){
      const w = trimStr(row[COL.WERKSTOFF]);

      const p1 = parseDimCell(row[COL.M1]);
      const p2 = parseDimCell(row[COL.M2]);

      // Bei Ø/DM darf eine der beiden Spalten leer sein -> dann reicht eine Zahl
      const isDiaRow = (p1.isDia || p2.isDia);

      if(!w) return false;

      if(isDiaRow){
        if(p1.num == null && p2.num == null) return false; // mindestens ein Ø-Maß vorhanden
      } else {
        if(p1.num == null || p2.num == null) return false; // normal: beide Maße müssen da sein
      }

      const k = trimStr(row[COL.KELLER]).toUpperCase();
      const lp = trimStr(row[COL.LAGER]);
      if(!lp && k !== "K") return false;

      return true;
    }

    function uniqueSortedText(arr){
      const s = new Set();
      arr.forEach(v => { const t = trimStr(v); if(t) s.add(t); });
      return Array.from(s).sort((a,b)=>a.localeCompare(b,"de"));
    }

    // NEU: sort für Dim-Objekte
    function uniqueSortedDims(dimObjs){
      const m = new Map();
      dimObjs.forEach(d=>{
        if(!d || !d.key) return;
        if(!m.has(d.key)) m.set(d.key, d);
      });

      const arr = Array.from(m.values());
      arr.sort((a,b)=>{
        if(a.num !== b.num) return a.num - b.num;
        // bei gleicher Zahl: Ø zuerst (damit es auffällt)
        if(a.isDia !== b.isDia) return (a.isDia ? -1 : 1);
        return 0;
      });
      return arr;
    }

    function setActiveButton(btn){
      document.querySelectorAll(".mat-btn").forEach(b=>b.classList.remove("active"));
      if(btn) btn.classList.add("active");
    }

    function clearResultArea(){
      resultArea.innerHTML = "";
      resultArea.style.display = "none";
    }

    function buildMaterialButtonsFromData(){
      materialsContainer.innerHTML = "";
      selectedWerkstoff = null;
      currentPairs = [];
      currentDims = [];
      selectedDim1 = null;
      selectedDim2 = null;

      dimensionArea.style.display = "none";
      clearResultArea();

      const werkstoffe = uniqueSortedText(
        dataRows.filter(isValidRow).map(r => r[COL.WERKSTOFF])
      );

      werkstoffe.forEach(name=>{
        const btn = document.createElement("button");
        btn.className = "mat-btn";
        btn.textContent = name;
        btn.addEventListener("click", ()=>onWerkstoffClick(name, btn));
        materialsContainer.appendChild(btn);
      });
    }

    function onWerkstoffClick(name, btn){
      selectedWerkstoff = name;
      setActiveButton(btn);

      currentPairs = [];
      const dims = [];

      dataRows.forEach(row=>{
        if(!isValidRow(row)) return;
        if(trimStr(row[COL.WERKSTOFF]) !== name) return;

        const p1 = parseDimCell(row[COL.M1]);
        const p2 = parseDimCell(row[COL.M2]);

        const isDiaRow = (p1.isDia || p2.isDia);

        // Wenn Ø/DM in einer Spalte vorkommt -> beide Dropdowns sollen Ø anzeigen
        const aNum = p1.num;
        const bNum = p2.num;

        // Für Ø-Reihen kann eine Seite leer sein:
        // wir speichern trotzdem beide Keys, aber nur wenn num vorhanden.
        const aKey = (aNum!=null) ? dimKey(aNum, isDiaRow ? true : p1.isDia) : null;
        const bKey = (bNum!=null) ? dimKey(bNum, isDiaRow ? true : p2.isDia) : null;

        // Für die Auswahllisten sammeln wir alles, was vorhanden ist
        if(aKey) dims.push({ key:aKey, num:aNum, isDia: isDiaRow ? true : p1.isDia });
        if(bKey) dims.push({ key:bKey, num:bNum, isDia: isDiaRow ? true : p2.isDia });

        // Paar speichern (auch wenn eine Seite fehlt, wichtig für Ø-Einzelwahl)
        currentPairs.push({ row, aKey, bKey, isDiaRow });
      });

      currentDims = uniqueSortedDims(dims);
      selectedDim1 = null;
      selectedDim2 = null;

      fillSelect(select1, "Maß 1", currentDims, null);
      fillSelect(select2, "Maß 2", currentDims, null);

      dimensionArea.style.display = currentDims.length ? "block" : "none";
      clearResultArea();
    }

    function fillSelect(sel, placeholder, dims, keepKey){
      sel.innerHTML = "";
      const ph = document.createElement("option");
      ph.value = "";
      ph.textContent = placeholder;
      sel.appendChild(ph);

      dims.forEach(d=>{
        const opt = document.createElement("option");
        opt.value = d.key;
        opt.textContent = (d.isDia ? "Ø " : "") + String(d.num);
        sel.appendChild(opt);
      });

      sel.value = (keepKey && dims.some(d=>d.key===keepKey)) ? keepKey : "";
    }

    function computeAllowedDims(fixedKey){
      if(!fixedKey) return currentDims.slice();

      const allowedKeys = new Set();

      currentPairs.forEach(p=>{
        if(!p.aKey && !p.bKey) return;

        if(p.aKey === fixedKey && p.bKey) allowedKeys.add(p.bKey);
        if(p.bKey === fixedKey && p.aKey) allowedKeys.add(p.aKey);

        // Ø/DM Sonderfall: Einzelmaß soll suchbar sein -> wir lassen das Dropdown NICHT leerfiltern,
        // sondern erlauben weiterhin alle Ø-Werte. (Sonst wird es "zäh".)
      });

      // Wenn nichts gefunden: fallback = alle
      if(allowedKeys.size === 0) return currentDims.slice();

      return currentDims.filter(d=>allowedKeys.has(d.key));
    }

    function onSelectChange(from){
      const v1 = select1.value ? String(select1.value) : null;
      const v2 = select2.value ? String(select2.value) : null;

      selectedDim1 = v1;
      selectedDim2 = v2;

      if(from===1){
        const allowed2 = computeAllowedDims(selectedDim1);
        const keep = allowed2.some(d=>d.key===selectedDim2) ? selectedDim2 : null;
        if(!keep) selectedDim2 = null;
        fillSelect(select2, "Maß 2", allowed2, keep);
      } else {
        const allowed1 = computeAllowedDims(selectedDim2);
        const keep = allowed1.some(d=>d.key===selectedDim1) ? selectedDim1 : null;
        if(!keep) selectedDim1 = null;
        fillSelect(select1, "Maß 1", allowed1, keep);
      }
    }

    // ===== Ausgabe-Regeln (deine 2 Bedingungen) =====
    function buildAusgabenForRow(row){
      const ausgaben = [];

      const keller = trimStr(row[COL.KELLER]).toUpperCase(); // nur "K" oder leer
      const lager  = trimStr(row[COL.LAGER]);

      // Keller-Ausgabe wenn Keller = K
      if(keller === "K"){
        ausgaben.push({
          kind: "KELLER",
          number: "K",
          line1: "Keller",
          line2: ""
        });
      }

      // Lager-Ausgabe wenn Lagerplatz vorhanden
      if(lager){
        // Palette: nur Ziffern
        if(/^\d+$/.test(lager)){
          ausgaben.push({
            kind: "LAGER",
            number: lager,
            line1: "Palette",
            line2: ""
          });
        } else {
          const parts = lager.split(".");
          const feld = parts[0] || "";
          const fach = parts[1] || "";
          const pos  = parts[2] || "";

          ausgaben.push({
            kind: "LAGER",
            number: feld || "-",
            line1: fach ? `Fach ${fach}` : "",
            line2: pos ? `Pos. ${pos}` : ""
          });
        }
      }

      // Ergebnis: 1 Ausgabe (nur K) oder 2 Ausgaben (K + Lager) oder nur Lager
      return ausgaben;
    }

    // ===== Lageplan =====
    const LAYOUT_SHELVES = [
      { id: 1,  row: 0, col: 1 },
      { id: 2,  row: 0, col: 2 },
      { id: 3,  row: 0, col: 3 },
      { id: 4,  row: 0, col: 4 },

      { id: 9,  row: 3, col: 2 },
      { id: 8,  row: 3, col: 3 },
      { id:10, row: 4, col: 2 },
      { id: 7,  row: 4, col: 3 },
      { id:11, row: 5, col: 2 },
      { id: 6,  row: 5, col: 3 },
      { id:12, row: 6, col: 2 },
      { id: 5,  row: 6, col: 3 },

      { id: 13, row: 7, col: 2.5 },

      { id: 15, row: 10, col: 2 },
